version: "3.7"

# docker stack deploy -c docker-stack.yml keekconecta

services:
  db:
    image: mysql:8.0
    networks:
      - keek_internal
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
      - MYSQL_DATABASE=${DB_NAME:-edidesk}
      - MYSQL_USER=${DB_USER:-keek}
      - MYSQL_PASSWORD=${DB_PASS}
      - TZ=America/Sao_Paulo
    volumes:
      - keek_db:/var/lib/mysql
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "1"
          memory: 512M

  app:
    image: adrielferr/parlamentares:latest
    networks:
      - network_public
      - keek_internal
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-edidesk}
      - DB_USER=${DB_USER:-keek}
      - DB_PASS=${DB_PASS}
      - CRYPTO_KEY=${CRYPTO_KEY}
      - APP_URL=https://${APP_DOMAIN}
      - BASE_PATH=
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@keekconecta.com.br}
      - ADMIN_PASS=${ADMIN_PASS}
      - TZ=America/Sao_Paulo
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - traefik.enable=1
        - traefik.http.routers.keekconecta.rule=Host(`${APP_DOMAIN}`)
        - traefik.http.routers.keekconecta.entrypoints=websecure
        - traefik.http.routers.keekconecta.priority=1
        - traefik.http.routers.keekconecta.tls.certresolver=letsencryptresolver
        - traefik.http.routers.keekconecta.service=keekconecta
        - traefik.http.services.keekconecta.loadbalancer.server.port=80
        - traefik.http.services.keekconecta.loadbalancer.passHostHeader=true
        - traefik.http.services.keekconecta.loadbalancer.sticky.cookie=true
        - traefik.http.services.keekconecta.loadbalancer.sticky.cookie.name=KKSESSION
      resources:
        limits:
          cpus: "1"
          memory: 512M

volumes:
  keek_db:

networks:
  network_public:
    external: true
    name: network_public
  keek_internal:
    driver: overlay
